{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h4>{{ title }}</h4>

    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>Product</label>

                        {{ form.product }}

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="mb-3">

                        <label>Supplier</label>

                        {{ form.supplier }}

                    </div>

                </div>

            </div>

            <div class="row">

                <div class="col-md-4">

                    <div class="mb-3">

                        <label>Jumlah</label>

                        {{ form.quantity }}

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="mb-3">

                        <label>Harga</label>

                        {{ form.price }}

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="mb-3">

                        <label>Tanggal</label>

                        {{ form.date }}

                    </div>

                </div>

            </div>

            <div class="mb-3">

                <label>Invoice</label>

                {{ form.invoice }}

            </div>

            <div class="mb-3">

                <label>Catatan</label>

                {{ form.note }}

            </div>

            <button class="btn btn-success">

                Simpan

            </button>

            <a href="{% url 'stockin_list' %}"
               class="btn btn-secondary">

                Kembali

            </a>

        </form>

    </div>

</div>

{% endblock %}
