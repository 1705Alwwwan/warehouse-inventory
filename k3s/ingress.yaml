apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: warehouse
  namespace: apps

spec:
  ingressClassName: traefik

  rules:

  - host: warehouse.lab.local

    http:

      paths:

      - path: /
        pathType: Prefix

        backend:

          service:
            name: warehouse

            port:
              number: 80
